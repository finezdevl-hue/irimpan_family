{% extends "tree/admin_base.html" %}
{% block title %}Delete Member - Irimpan Kudumba Yogam{% endblock %}

{% block admin_content %}
<h1 class="section-title">Delete Member</h1>
<p class="section-sub">You are about to remove {{ person.full_name }}.</p>
<form method="post" class="card">
  {% csrf_token %}
  <p>Are you sure you want to delete this family member?</p>
  <div class="admin-actions" style="margin-top:1rem;">
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'admin_members' %}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
