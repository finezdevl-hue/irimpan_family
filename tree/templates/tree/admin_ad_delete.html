{% extends "tree/admin_base.html" %}
{% block title %}Delete Popup Ad - Irimpan Kudumba Yogam{% endblock %}

{% block admin_content %}
<div class="admin-head">
  <div>
    <h1 class="section-title">Delete Popup Ad</h1>
    <p>Remove this popup ad from the website.</p>
  </div>
</div>
<form method="post" class="card">
  {% csrf_token %}
  <p>Are you sure you want to delete <strong>{{ ad.title }}</strong>?</p>
  <div class="admin-actions" style="margin-top:1rem;">
    <button type="submit" class="btn btn-danger">Delete Ad</button>
    <a href="{% url 'admin_ads' %}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
