services:
  - type: web
    name: irimpan-family
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn family_tree.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: irimpan-family-db
          property: connectionString

databases:
  - name: irimpan-family-db
    plan: free
