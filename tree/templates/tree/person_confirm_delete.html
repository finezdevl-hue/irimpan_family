{% extends "tree/base.html" %}
{% block title %}Remove {{ person.full_name }} — Family Tree{% endblock %}
{% block content %}
<div style="max-width:480px;margin:2rem auto;text-align:center;">
  <div class="card">
    <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
    <h2 style="font-family:'Playfair Display',serif;color:var(--cream);margin-bottom:0.5rem;">Remove Member?</h2>
    <p style="color:var(--text-dim);margin-bottom:1.5rem;">
      Are you sure you want to remove <strong style="color:var(--cream)">{{ person.full_name }}</strong> from the family tree?
      This action cannot be undone.
    </p>
    <form method="post" style="display:flex;gap:0.75rem;justify-content:center;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Remove</button>
      <a href="{{ person.get_absolute_url }}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
