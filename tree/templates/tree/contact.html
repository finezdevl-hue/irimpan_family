{% extends "tree/base.html" %}
{% block title %}Contact Us - Family Tree{% endblock %}

{% block content %}
<section class="hero-band">
  <h1 class="section-title">Contact Us</h1>
  <p class="section-sub">Share corrections, event ideas, and family updates with the site administrators.</p>
</section>

<div class="card" style="max-width:760px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label" for="name">Your Name</label>
      <input id="name" name="name" class="form-input" placeholder="Enter your name">
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input id="email" name="email" type="email" class="form-input" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label class="form-label" for="subject">Subject</label>
      <input id="subject" name="subject" class="form-input" placeholder="What would you like to share?">
    </div>
    <div class="form-group">
      <label class="form-label" for="message">Message</label>
      <textarea id="message" name="message" rows="6" class="form-input" placeholder="Write your message"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>
</div>
{% endblock %}
