{% extends "tree/base.html" %}

{% block extra_css %}
<style>
  .admin-layout {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: 1.25rem;
  }
  .admin-sidebar,
  .admin-content-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
  }
  .admin-sidebar {
    padding: 1.25rem;
    align-self: start;
    position: sticky;
    top: 88px;
  }
  .admin-sidebar h2 {
    color: var(--cream);
    font-size: 1.25rem;
    margin-bottom: 0.35rem;
  }
  .admin-sidebar p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }
  .admin-nav {
    display: grid;
    gap: 0.5rem;
  }
  .admin-nav a {
    text-decoration: none;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 0.9rem;
    font-weight: 700;
  }
  .admin-nav a:hover {
    border-color: var(--gold-dim);
    color: var(--gold-dim);
  }
  .admin-content-card {
    padding: 1.5rem;
  }
  .admin-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .admin-head p {
    color: var(--text-dim);
  }
  .admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
  }
  .admin-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.2rem;
  }
  .admin-stat strong {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold-dim);
  }
  .admin-table-wrap {
    overflow-x: auto;
  }
  .admin-table {
    width: 100%;
    border-collapse: collapse;
  }
  .admin-table th,
  .admin-table td {
    padding: 0.9rem 0.75rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  .admin-table th {
    color: var(--gold-dim);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .admin-actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  @media (max-width: 900px) {
    .admin-layout {
      grid-template-columns: 1fr;
    }
    .admin-sidebar {
      position: static;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="admin-layout">
  <aside class="admin-sidebar">
    <h2>Custom Admin</h2>
    <p>Manage members, events, and event gallery photos from one place.</p>
    <nav class="admin-nav">
      <a href="{% url 'admin_panel' %}">Dashboard</a>
      <a href="{% url 'admin_members' %}">Members</a>
      <a href="{% url 'admin_events' %}">Upcoming Events</a>
      <a href="{% url 'admin_gallery' %}">Event Gallery</a>
      <a href="/admin/">Django Admin</a>
    </nav>
  </aside>

  <section class="admin-content-card">
    {% block admin_content %}{% endblock %}
  </section>
</div>
{% endblock %}
